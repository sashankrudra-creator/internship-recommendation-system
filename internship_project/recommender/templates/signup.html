{% extends 'base.html' %}

{% block content %}
<div class="row m-0 min-vh-100 align-items-center justify-content-center" style="background-color: var(--light-green);">
    <div class="col-md-5 col-lg-4">
        <div class="card-custom border-1 shadow-sm p-4">
            <div class="text-center mb-5">
                <h1 class="fw-bold text-success">Join FuturePath</h1>
                <p class="text-muted">Start your career journey today.</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-bold text-uppercase">Choose Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-uppercase">Create Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <div class="d-grid gap-3">
                    <button type="submit" class="btn btn-green">Create Account</button>
                    <div class="text-center">
                        <span class="text-muted small">Already have an account?</span>
                        <a href="{% url 'login' %}" class="text-success small fw-bold text-decoration-none">Log In</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
